# Nginx configuration for Next.js Science Portal
# Supports configurable basePath (default: /canfar-app)

upstream nextjs_upstream {
  server nextjs:3000;
}

server {
  listen 80;
  server_name _;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied expired no-cache no-store private auth;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
  gzip_disable "MSIE [1-6]\.";

  # Proxy settings
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection 'upgrade';
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_cache_bypass $http_upgrade;

  # Redirect root to basePath
  location = / {
    return 302 /canfar-app;
  }

  # Static files with caching (basePath prefixed)
  location /canfar-app/_next/static {
    proxy_pass http://nextjs_upstream;
    proxy_cache_valid 200 60m;
    add_header Cache-Control "public, max-age=3600, immutable";
  }

  # Static files from public directory (basePath prefixed)
  location /canfar-app/static {
    proxy_pass http://nextjs_upstream;
    proxy_cache_valid 200 60m;
    add_header Cache-Control "public, max-age=3600";
  }

  # Images under basePath
  location ~* ^/canfar-app/.*\.(jpg|jpeg|png|gif|ico|svg|webp)$ {
    proxy_pass http://nextjs_upstream;
    proxy_cache_valid 200 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # API routes under basePath (no caching)
  location /canfar-app/api/ {
    proxy_pass http://nextjs_upstream;
    proxy_buffering off;
  }

  # Health check endpoint
  location /canfar-app/api/health {
    proxy_pass http://nextjs_upstream;
    access_log off;
  }

  # Metrics endpoint
  location /canfar-app/api/metrics {
    proxy_pass http://nextjs_upstream;
  }

  # All routes under basePath
  location /canfar-app {
    proxy_pass http://nextjs_upstream;
  }

  # Fallback - proxy everything else to Next.js
  location / {
    proxy_pass http://nextjs_upstream;
  }
}
